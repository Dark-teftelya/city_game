name: Build SFML Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install sfml

      - name: Build project
        shell: cmd
        run: |
          g++ -std=c++17 main.cpp MenuState.cpp GameState.cpp RulesState.cpp SettingsState.cpp ^
          -I vcpkg\installed\x64-windows\include ^
          -L vcpkg\installed\x64-windows\lib ^
          -lsfml-graphics -lsfml-window -lsfml-system -lsfml-audio ^
          -o gorodki.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: gorodki
          path: gorodki.exe
