name: Build SFML Project

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ \
            make \
            libsfml-dev

      - name: Build project
        run: |
          g++ -std=c++17 \
            main.cpp \
            MenuState.cpp \
            GameState.cpp \
            RulesState.cpp \
            SettingsState.cpp \
            -o city_game \
            -lsfml-graphics \
            -lsfml-window \
            -lsfml-system \
            -lsfml-audio

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: city_game
          path: city_game
