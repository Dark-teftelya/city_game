name: Build SFML Project (Windows EXE)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install vcpkg and SFML
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg install sfml:x64-windows

      - name: Build project
        run: g++ -std=c++17 main.cpp MenuState.cpp GameState.cpp RulesState.cpp SettingsState.cpp -o city_game.exe -IC:\vcpkg\installed\x64-windows\include -LC:\vcpkg\installed\x64-windows\lib -lsfml-graphics -lsfml-window -lsfml-system -lsfml-audio

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: city_game.exe
          path: city_game.exe
