name: Build SFML App (stable)

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download SFML 2.6.2
        run: |
          curl -L -o sfml.zip https://www.sfml-dev.org/files/SFML-2.6.2-windows-gcc-12.2.0-mingw-64-bit.zip
          tar -xf sfml.zip

      - name: Build
        run: |
          g++ -std=c++17 main.cpp MenuState.cpp GameState.cpp RulesState.cpp SettingsState.cpp -o app.exe ^
          -ISFML-2.6.2/include ^
          -LSFML-2.6.2/lib ^
          -lsfml-graphics -lsfml-window -lsfml-system -lsfml-audio

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: gorodki
          path: app.exe
