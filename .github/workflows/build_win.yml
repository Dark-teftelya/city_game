name: Build Gorodki (Windows)

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 and install SFML
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-sfml

      - name: Build project
        shell: msys2 {0}
        run: |
          g++ -std=c++17 -O2 -static -o gorodki.exe ^
            main.cpp MenuState.cpp GameState.cpp RulesState.cpp SettingsState.cpp ^
            -I/mingw64/include ^
            -L/mingw64/lib ^
            -lsfml-graphics -lsfml-window -lsfml-system -lsfml-audio ^
            -Wno-unused-result

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: gorodki-windows
          path: gorodki.exe
          if-no-files-found: error
