name: Build SFML App

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SFML 2
        run: |
          git clone https://github.com/SFML/SFML.git
          cd SFML
          git checkout 2.6.x
          mkdir build
          cd build
          cmake -G "MinGW Makefiles" -DCMAKE_INSTALL_PREFIX=../../SFML-install ..
          cmake --build . --target install

      - name: Build project
        run: |
          g++ -std=c++17 main.cpp SettingsState.cpp \
          -I SFML-install/include \
          -L SFML-install/lib \
          -lsfml-graphics -lsfml-window -lsfml-system -lsfml-audio \
          -o app.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: my-app
          path: app.exe
